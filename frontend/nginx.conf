server {
    listen 80;
    client_max_body_size 50m;

    # Backup em lote: ZIP streamado que pode demorar. Desliga o buffering (senão
    # o nginx segura o ZIP inteiro em disco antes de repassar) e alarga o timeout
    # entre blocos (um PDF grande pode passar do default de 60s). Declarado ANTES
    # do /api/ genérico para ter precedência.
    location = /api/rh/arquivo/lote {
        proxy_pass http://api:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    location /api/ {
        proxy_pass http://api:8000;
        # $http_host preserva a porta (ex.: IP:8090) — $host a descartaria e os
        # links gerados pelo backend sairiam errados no acesso sem domínio.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
        # index.html nunca em cache: garante que todo deploy chegue ao navegador.
        location = /index.html {
            add_header Cache-Control "no-store, must-revalidate";
        }
    }
}
