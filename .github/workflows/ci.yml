name: integração

# Um único workflow com dois jobs (antes eram dois arquivos separados, e a
# lista de Actions mostrava cada commit duas vezes). Agora cada push aparece
# uma vez só, com os jobs "imagens" e "testes-de-interface" dentro dele.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  REGISTRY: ghcr.io

jobs:
  imagens:
    # Publica as imagens no GHCR: em push para main e em tags de versão.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - servico: api
            contexto: ./backend
          - servico: frontend
            contexto: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.servico }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.contexto }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  testes-de-interface:
    # Playwright contra a stack completa: em push para main e em pull requests
    # (não em tags — a imagem da tag é a mesma já testada no push do main).
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Cria .env de teste
        run: |
          cat > .env <<'EOF'
          ENVIRONMENT=ci
          SECRET_KEY=segredo-apenas-para-ci
          BASE_URL=http://localhost:8090
          FRONTEND_PORT=8090
          POSTGRES_USER=admissao
          POSTGRES_PASSWORD=admissao-ci
          POSTGRES_DB=admissao
          DATABASE_URL=postgresql+psycopg://admissao:admissao-ci@db:5432/admissao
          REDIS_URL=redis://redis:6379/0
          MINIO_ROOT_USER=minio
          MINIO_ROOT_PASSWORD=minio-ci-12345
          MINIO_ENDPOINT=minio:9000
          MINIO_ACCESS_KEY=minio
          MINIO_SECRET_KEY=minio-ci-12345
          MINIO_BUCKET=admissao
          MINIO_SECURE=false
          RH_ADMIN_EMAIL=rh@greenhousedf.com.br
          RH_ADMIN_PASSWORD=senha-ci-12345678
          EOF

      - name: Sobe a stack completa
        run: docker compose --env-file .env
          -f deploy/docker-compose.base.yml -f deploy/docker-compose.ip.yml
          up -d --build

      - name: Aguarda a API responder
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8090/api/health > /dev/null 2>&1; then
              echo "API no ar"; exit 0
            fi
            sleep 3
          done
          echo "API não subiu a tempo" >&2
          docker compose --env-file .env \
            -f deploy/docker-compose.base.yml -f deploy/docker-compose.ip.yml logs api
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instala Playwright
        working-directory: frontend
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Roda os testes de interface
        working-directory: frontend
        env:
          BASE_URL: http://localhost:8090
          RH_EMAIL: rh@greenhousedf.com.br
          RH_SENHA: senha-ci-12345678
        run: npx playwright test

      - name: Logs da stack (em caso de falha)
        if: failure()
        run: docker compose --env-file .env
          -f deploy/docker-compose.base.yml -f deploy/docker-compose.ip.yml
          logs --tail 100
