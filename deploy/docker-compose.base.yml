# ============================================================================
# ATENÇÃO: este arquivo NÃO roda sozinho — é a BASE (serviços comuns) do padrão
# oficial de composição do Docker Compose. Combine-o SEMPRE com uma variante
# (ip/traefik/certbot), que completa portas e TLS. Requer o código-fonte
# (build a partir de ./backend e ./frontend) e o .env na raiz.
#
# 👉 Para subir como STACK no Portainer (sem código-fonte, com imagens prontas
#    do GHCR), use o arquivo único: deploy/portainer-stack.yml
# ============================================================================
# Uso a partir da raiz do repositório:
#   docker compose -f deploy/docker-compose.base.yml -f deploy/docker-compose.ip.yml up -d
#   docker compose -f deploy/docker-compose.base.yml -f deploy/docker-compose.traefik.yml up -d
#   docker compose -f deploy/docker-compose.base.yml -f deploy/docker-compose.certbot.yml up -d

services:
  api:
    build: ../backend
    env_file: ../.env
    depends_on:
      - db
      - redis
      - minio
    networks: [internal]
    restart: unless-stopped

  worker:
    build: ../backend
    # padrão evita URL vazia quando o compose não acha o .env da raiz
    # (interpolação usa o diretório do primeiro -f; ver nota no ip.yml)
    command: rq worker --url ${REDIS_URL:-redis://redis:6379/0} default
    env_file: ../.env
    depends_on:
      - redis
      - minio
    networks: [internal]
    restart: unless-stopped

  expurgo:
    build: ../backend
    entrypoint: ["/bin/sh", "-c"]
    # Roda o expurgo a cada 24h (LGPD + espaço em disco no MinIO).
    command: ["while true; do python -m app.workers.expurgo; sleep 86400; done"]
    env_file: ../.env
    depends_on:
      - db
      - minio
    networks: [internal]
    restart: unless-stopped

  frontend:
    build: ../frontend
    depends_on:
      - api
    networks: [internal]
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file: ../.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [internal]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks: [internal]
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data
    env_file: ../.env
    volumes:
      - minio-data:/data
    networks: [internal]
    restart: unless-stopped

networks:
  internal:

volumes:
  postgres-data:
  minio-data:
