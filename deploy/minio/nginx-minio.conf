# ============================================================================
# Nginx (VPS) — MinIO: API S3 (s3.SEUDOMINIO) e Console (minio.SEUDOMINIO)
# ----------------------------------------------------------------------------
# Copie para /etc/nginx/sites-available/, ajuste os server_name e caminhos de
# certificado, faça o symlink em sites-enabled/ e recarregue:
#   sudo ln -s /etc/nginx/sites-available/minio /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: emita os certificados antes (recomendado certbot --nginx):
#   sudo certbot --nginx -d s3.SEUDOMINIO -d minio.SEUDOMINIO
# ============================================================================

# ---- API S3 (SDK / mc / integrações externas) ----------------------------
server {
    listen 443 ssl http2;
    server_name s3.SEUDOMINIO;              # <-- ajuste

    ssl_certificate     /etc/letsencrypt/live/s3.SEUDOMINIO/fullchain.pem;   # <-- ajuste
    ssl_certificate_key /etc/letsencrypt/live/s3.SEUDOMINIO/privkey.pem;     # <-- ajuste

    # uploads grandes (dossiês, planilhas): sem limite de corpo
    client_max_body_size 0;
    ignore_invalid_headers off;
    proxy_buffering off;
    proxy_request_buffering off;

    location / {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
        proxy_pass http://127.0.0.1:9100;   # MINIO_API_PORT (loopback; 91xx p/ não colidir com Portainer)
    }
}

# ---- Console web de administração ----------------------------------------
server {
    listen 443 ssl http2;
    server_name minio.SEUDOMINIO;           # <-- ajuste

    ssl_certificate     /etc/letsencrypt/live/minio.SEUDOMINIO/fullchain.pem; # <-- ajuste
    ssl_certificate_key /etc/letsencrypt/live/minio.SEUDOMINIO/privkey.pem;   # <-- ajuste

    client_max_body_size 0;
    ignore_invalid_headers off;
    proxy_buffering off;

    location / {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-NginX-Proxy     true;

        # o console usa WebSocket — obrigatório:
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
        chunked_transfer_encoding off;

        proxy_pass http://127.0.0.1:9101;   # MINIO_CONSOLE_PORT (loopback; 91xx p/ não colidir com Portainer)
    }
}

# ---- Redireciona http -> https (ambos os subdomínios) --------------------
server {
    listen 80;
    server_name s3.SEUDOMINIO minio.SEUDOMINIO;   # <-- ajuste
    return 301 https://$host$request_uri;
}
