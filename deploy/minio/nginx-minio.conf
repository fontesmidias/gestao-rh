# ============================================================================
# Nginx (VPS) — MinIO: API S3 (s3.SEUDOMINIO) e Console (minio.SEUDOMINIO)
# ----------------------------------------------------------------------------
# Copie para /etc/nginx/sites-available/minio, ajuste os server_name, faça o
# symlink em sites-enabled/ e recarregue. Os certificados TLS são emitidos e
# apontados pelo certbot (ver passo a passo em deploy/admin-minio-pgadmin.md).
#
#   sudo ln -s /etc/nginx/sites-available/minio /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d s3.SEUDOMINIO -d minio.SEUDOMINIO
#   sudo nginx -t && sudo systemctl reload nginx
#
# BASIC AUTH (só no console minio.): crie o arquivo de senha uma vez —
#   sudo apt-get install -y apache2-utils          # traz o htpasswd
#   sudo htpasswd -c /etc/nginx/.htpasswd-minio SEU_USUARIO
#   # (para adicionar mais gente depois, SEM o -c: htpasswd /etc/nginx/.htpasswd-minio outro)
#
# ⚠️ A API S3 (s3.) NÃO leva Basic Auth: os SDKs/mc/boto autenticam com a
#    chave S3 (MINIO_ROOT_USER/SECRET). Basic Auth ali quebraria o app.
#    A proteção do console é o que importa (é o painel admin do storage).
# ============================================================================

# ---- API S3 (SDK / mc / integrações externas) — SEM Basic Auth ------------
server {
    listen 443 ssl http2;
    server_name s3.SEUDOMINIO;              # <-- ajuste

    # ssl_certificate* preenchidos pelo certbot --nginx

    # uploads grandes (dossiês, planilhas): sem limite de corpo
    client_max_body_size 0;
    ignore_invalid_headers off;
    proxy_buffering off;
    proxy_request_buffering off;

    # força o navegador a nunca falar HTTP com este subdomínio
    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
        proxy_pass http://127.0.0.1:9100;   # MINIO_API_PORT (loopback)
    }
}

# ---- Console web de administração — COM Basic Auth ------------------------
server {
    listen 443 ssl http2;
    server_name minio.SEUDOMINIO;           # <-- ajuste

    # ssl_certificate* preenchidos pelo certbot --nginx

    client_max_body_size 0;
    ignore_invalid_headers off;
    proxy_buffering off;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # camada extra de senha na frente do login do MinIO
    auth_basic           "MinIO — acesso restrito (Portal de RH)";
    auth_basic_user_file /etc/nginx/.htpasswd-minio;

    location / {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-NginX-Proxy     true;

        # o console usa WebSocket — obrigatório:
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
        chunked_transfer_encoding off;

        proxy_pass http://127.0.0.1:9101;   # MINIO_CONSOLE_PORT (loopback)
    }
}

# ---- Redireciona http -> https (ambos os subdomínios) --------------------
# OBS: se o certbot --nginx já tiver criado este bloco 80, não duplique —
# mantenha só um. O certbot costuma inserir o redirect automaticamente.
server {
    listen 80;
    server_name s3.SEUDOMINIO minio.SEUDOMINIO;   # <-- ajuste
    return 301 https://$host$request_uri;
}
